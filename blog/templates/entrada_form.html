{% extends "base.html" %}

{% block contenido %}
<h1>{% if entrada %}Editar Entrada{% else %}Nueva Entrada{% endif %}</h1>
<br>
<form method="POST">
    <label>Título</label>
    <input type="text" name="titulo" value="{{ entrada[1] if entrada else '' }}" required>

    <label>Fecha</label>
    <input type="date" name="fecha" value="{{ entrada[2] if entrada else '' }}" required>

    <label>Autor</label>
    <input type="text" name="autor" value="{{ entrada[3] if entrada else '' }}" required>

    <label>Contenido</label>
    <textarea name="contenido" rows="6" required>{{ entrada[4] if entrada else '' }}</textarea>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/admin" class="btn btn-danger">Cancelar</a>
</form>
{% endblock %}
